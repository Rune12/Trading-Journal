<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0D0F14;
    --surface: #1A1D25;
    --surface2: #21252F;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #E2E8F0;
    --muted: #8892A4;
    --green: #00C896;
    --red: #FF4757;
    --gold: #E8B84B;
    --font: 'Inter', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
  }

  .logo { font-size: 15px; font-weight: 600; letter-spacing: -.3px; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  .header-sub { font-size: 12px; color: var(--muted); }

  main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  .tabs { display: flex; gap: 6px; margin-bottom: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; width: fit-content; }
  .tab { padding: 8px 20px; border-radius: 7px; border: none; background: none; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 500; font-family: var(--font); transition: all .15s; }
  .tab.active { background: var(--surface2); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.4); }

  .section { display: none; }
  .section.visible { display: block; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
  .stat-value { font-size: 24px; font-weight: 600; font-family: var(--mono); }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.gold { color: var(--gold); }

  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 1.5rem; }
  .chart-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 14px; }

  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 1.5rem; }
  .form-title { font-size: 13px; font-weight: 500; margin-bottom: 14px; color: var(--muted); }
  .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
  .form-grid-2 { grid-template-columns: repeat(2, 1fr); }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .field input, .field select {
    width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 6px;
    color: var(--text); font-family: var(--mono); font-size: 13px; padding: 8px 10px;
    outline: none; transition: border-color .15s;
  }
  .field input:focus, .field select:focus { border-color: var(--green); }
  .field select option { background: var(--surface2); }
  .btn-add {
    background: var(--green); color: #fff; border: none; border-radius: 7px;
    padding: 9px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: var(--font); transition: opacity .15s;
  }
  .btn-add:hover { opacity: .88; }

  .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
  thead th { background: var(--surface2); padding: 10px 12px; text-align: left; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
  tbody td { padding: 11px 12px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 12px; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface2); }

  .pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; font-family: var(--font); }
  .pill-long { background: rgba(0,200,150,.15); color: var(--green); }
  .pill-short { background: rgba(255,71,87,.15); color: var(--red); }
  .tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); margin: 1px; font-family: var(--font); }

  .del-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px 6px; border-radius: 4px; font-size: 14px; transition: all .15s; }
  .del-btn:hover { color: var(--red); background: rgba(255,71,87,.1); }

  .empty { text-align: center; padding: 2.5rem; color: var(--muted); font-size: 13px; font-family: var(--font); }

  .export-row { display: flex; gap: 8px; margin-bottom: 1rem; justify-content: flex-end; }
  .btn-export { background: none; border: 1px solid var(--border2); border-radius: 6px; color: var(--muted); padding: 7px 14px; font-size: 12px; cursor: pointer; font-family: var(--font); transition: all .15s; }
  .btn-export:hover { border-color: var(--gold); color: var(--gold); }

  @media (max-width: 700px) {
    .stats-grid { grid-template-columns: repeat(2,1fr); }
    .form-grid { grid-template-columns: repeat(2,1fr); }
    main { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div> Trading Journal</div>
  <div class="header-sub" id="header-date"></div>
</header>

<main>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('live')">&#9889; Live Trades</button>
    <button class="tab" onclick="switchTab('bt')">&#8635; Backtest Trades</button>
  </div>

  <!-- LIVE -->
  <div id="sec-live" class="section visible">
    <div class="stats-grid" id="live-stats"></div>
    <div class="chart-card">
      <div class="chart-label">Equity curve</div>
      <div style="position:relative;height:160px;"><canvas id="live-chart"></canvas></div>
    </div>
    <div class="form-card">
      <div class="form-title">+ Nieuwe trade invoeren</div>
      <div class="form-grid">
        <div class="field"><label>Datum</label><input type="date" id="l-date"></div>
        <div class="field"><label>Symbool</label><input type="text" id="l-sym" placeholder="EURUSD"></div>
        <div class="field"><label>Richting</label><select id="l-dir"><option value="Long">Long</option><option value="Short">Short</option></select></div>
        <div class="field"><label>Instapprijs</label><input type="number" id="l-entry" placeholder="1.0850" step="any"></div>
        <div class="field"><label>Exitprijs</label><input type="number" id="l-exit" placeholder="1.0920" step="any"></div>
        <div class="field"><label>Grootte (lot/qty)</label><input type="number" id="l-size" placeholder="0.10" step="any"></div>
        <div class="field"><label>P&amp;L (€)</label><input type="number" id="l-pnl" placeholder="70" step="any"></div>
        <div class="field"><label>R-multiple</label><input type="number" id="l-r" placeholder="1.4" step="any"></div>
        <div class="field"><label>Tags (komma gescheiden)</label><input type="text" id="l-tag" placeholder="Breakout, OB, FVG..."></div>
      </div>
      <div class="field" style="margin-bottom:12px;"><label>Notities</label><input type="text" id="l-notes" placeholder="Wat zag je? Hoe voelde de trade?"></div>
      <button class="btn-add" onclick="addTrade('live')">Trade opslaan</button>
    </div>
    <div class="export-row">
      <button class="btn-export" onclick="exportCSV('live')">&#8595; Exporteer CSV</button>
    </div>
    <div class="table-card">
      <table>
        <thead><tr>
          <th style="width:90px">Datum</th>
          <th style="width:80px">Sym.</th>
          <th style="width:65px">Dir.</th>
          <th style="width:75px">Instap</th>
          <th style="width:75px">Exit</th>
          <th style="width:65px">Grootte</th>
          <th style="width:85px">P&amp;L</th>
          <th style="width:50px">R</th>
          <th>Tags / Notities</th>
          <th style="width:36px"></th>
        </tr></thead>
        <tbody id="live-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- BACKTEST -->
  <div id="sec-bt" class="section">
    <div class="stats-grid" id="bt-stats"></div>
    <div class="chart-card">
      <div class="chart-label">Equity curve backtest</div>
      <div style="position:relative;height:160px;"><canvas id="bt-chart"></canvas></div>
    </div>
    <div class="form-card">
      <div class="form-title">+ Nieuwe backtest trade invoeren</div>
      <div class="form-grid">
        <div class="field"><label>Datum</label><input type="date" id="b-date"></div>
        <div class="field"><label>Symbool</label><input type="text" id="b-sym" placeholder="EURUSD"></div>
        <div class="field"><label>Richting</label><select id="b-dir"><option value="Long">Long</option><option value="Short">Short</option></select></div>
        <div class="field"><label>Instapprijs</label><input type="number" id="b-entry" placeholder="1.0850" step="any"></div>
        <div class="field"><label>Exitprijs</label><input type="number" id="b-exit" placeholder="1.0920" step="any"></div>
        <div class="field"><label>P&amp;L (€)</label><input type="number" id="b-pnl" placeholder="70" step="any"></div>
        <div class="field"><label>R-multiple</label><input type="number" id="b-r" placeholder="1.4" step="any"></div>
        <div class="field"><label>Strategie</label><input type="text" id="b-strat" placeholder="MA Cross, SMC, OB..."></div>
        <div class="field"><label>Timeframe</label><input type="text" id="b-tf" placeholder="1H, 4H, Daily"></div>
      </div>
      <div class="field" style="margin-bottom:12px;"><label>Notities</label><input type="text" id="b-notes" placeholder="Wat leerde je van deze setup?"></div>
      <button class="btn-add" onclick="addTrade('bt')">Trade opslaan</button>
    </div>
    <div class="export-row">
      <button class="btn-export" onclick="exportCSV('bt')">&#8595; Exporteer CSV</button>
    </div>
    <div class="table-card">
      <table>
        <thead><tr>
          <th style="width:90px">Datum</th>
          <th style="width:80px">Sym.</th>
          <th style="width:65px">Dir.</th>
          <th style="width:75px">Instap</th>
          <th style="width:75px">Exit</th>
          <th style="width:85px">P&amp;L</th>
          <th style="width:50px">R</th>
          <th style="width:80px">Timeframe</th>
          <th>Strategie / Notities</th>
          <th style="width:36px"></th>
        </tr></thead>
        <tbody id="bt-tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  var data = { live: [], bt: [] };
  var charts = {};
  var today = new Date().toISOString().slice(0,10);
  document.getElementById('l-date').value = today;
  document.getElementById('b-date').value = today;
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('nl-NL', {weekday:'long',day:'numeric',month:'long',year:'numeric'});

  function switchTab(t) {
    document.querySelectorAll('.tab').forEach(function(b,i){ b.classList.toggle('active',(t==='live'&&i===0)||(t==='bt'&&i===1)); });
    document.getElementById('sec-live').classList.toggle('visible', t==='live');
    document.getElementById('sec-bt').classList.toggle('visible', t==='bt');
  }

  function addTrade(mode) {
    var g = mode==='live' ? 'l' : 'b';
    var sym = document.getElementById(g+'-sym').value.trim().toUpperCase();
    if (!sym) { alert('Vul een symbool in (bijv. EURUSD).'); return; }
    var pnl = parseFloat(document.getElementById(g+'-pnl').value) || 0;
    var trade = {
      id: Date.now(),
      date: document.getElementById(g+'-date').value || today,
      sym: sym,
      dir: document.getElementById(g+'-dir').value,
      entry: document.getElementById(g+'-entry').value,
      exit: document.getElementById(g+'-exit').value,
      size: mode==='live' ? document.getElementById('l-size').value : '',
      pnl: pnl,
      r: document.getElementById(g+'-r').value,
      notes: document.getElementById(g+'-notes').value,
      tag: mode==='live' ? document.getElementById('l-tag').value : '',
      strat: mode==='bt' ? document.getElementById('b-strat').value : '',
      tf: mode==='bt' ? document.getElementById('b-tf').value : '',
    };
    data[mode].push(trade);
    save();
    renderAll();
    clearForm(mode);
  }

  function clearForm(mode) {
    var ids = mode==='live'
      ? ['l-sym','l-entry','l-exit','l-size','l-pnl','l-r','l-tag','l-notes']
      : ['b-sym','b-entry','b-exit','b-pnl','b-r','b-strat','b-tf','b-notes'];
    ids.forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });
  }

  function deleteTrade(mode, id) {
    if (!confirm('Trade verwijderen?')) return;
    data[mode] = data[mode].filter(function(t){ return t.id !== id; });
    save();
    renderAll();
  }

  function renderStats(mode) {
    var trades = data[mode];
    var wins = trades.filter(function(t){ return t.pnl > 0; });
    var total = trades.reduce(function(s,t){ return s+t.pnl; }, 0);
    var wr = trades.length ? Math.round(wins.length/trades.length*100) : 0;
    var rTrades = trades.filter(function(t){ return t.r && !isNaN(parseFloat(t.r)); });
    var avgR = rTrades.length ? (rTrades.reduce(function(s,t){ return s+parseFloat(t.r); },0)/rTrades.length).toFixed(2) : '-';
    var pf = '-';
    var gross_win = wins.reduce(function(s,t){ return s+t.pnl; },0);
    var gross_loss = Math.abs(trades.filter(function(t){ return t.pnl<0; }).reduce(function(s,t){ return s+t.pnl; },0));
    if (gross_loss > 0) pf = (gross_win/gross_loss).toFixed(2);
    document.getElementById(mode+'-stats').innerHTML =
      '<div class="stat-card"><div class="stat-label">Trades</div><div class="stat-value">'+trades.length+'</div></div>'+
      '<div class="stat-card"><div class="stat-label">Netto P&L</div><div class="stat-value '+(total>=0?'green':'red')+'">€'+total.toFixed(2)+'</div></div>'+
      '<div class="stat-card"><div class="stat-label">Winrate</div><div class="stat-value '+(wr>=50?'green':'red')+'">'+wr+'%</div></div>'+
      '<div class="stat-card"><div class="stat-label">Profit factor</div><div class="stat-value gold">'+pf+'</div></div>';
  }

  function renderTable(mode) {
    var trades = data[mode];
    var tbody = document.getElementById(mode+'-tbody');
    if (!trades.length) {
      tbody.innerHTML = '<tr><td colspan="10" class="empty">Nog geen trades. Voeg je eerste trade toe hierboven.</td></tr>';
      return;
    }
    var sorted = trades.slice().sort(function(a,b){ return b.date.localeCompare(a.date); });
    tbody.innerHTML = sorted.map(function(t) {
      var pnlColor = t.pnl > 0 ? '#00C896' : t.pnl < 0 ? '#FF4757' : '#8892A4';
      var pnlStr = (t.pnl >= 0 ? '+' : '') + '€' + t.pnl.toFixed(2);
      var dir = '<span class="pill '+(t.dir==='Long'?'pill-long':'pill-short')+'">'+t.dir+'</span>';
      if (mode === 'live') {
        var tags = t.tag ? t.tag.split(',').map(function(s){ return '<span class="tag">'+s.trim()+'</span>'; }).join('') : '';
        var note = t.notes ? '<span style="color:#8892A4;font-size:11px;font-family:var(--font);"> '+t.notes+'</span>' : '';
        return '<tr>'+
          '<td>'+t.date+'</td><td style="font-weight:500">'+t.sym+'</td><td>'+dir+'</td>'+
          '<td>'+( t.entry||'-')+'</td><td>'+(t.exit||'-')+'</td><td>'+(t.size||'-')+'</td>'+
          '<td style="color:'+pnlColor+';font-weight:600">'+pnlStr+'</td>'+
          '<td>'+(t.r||'-')+'</td>'+
          '<td>'+tags+note+'</td>'+
          '<td><button class="del-btn" onclick="deleteTrade(\'live\','+t.id+')" title="Verwijder">&#10005;</button></td>'+
          '</tr>';
      } else {
        var note2 = t.notes ? '<span style="color:#8892A4;font-size:11px;font-family:var(--font);"> '+t.notes+'</span>' : '';
        return '<tr>'+
          '<td>'+t.date+'</td><td style="font-weight:500">'+t.sym+'</td><td>'+dir+'</td>'+
          '<td>'+(t.entry||'-')+'</td><td>'+(t.exit||'-')+'</td>'+
          '<td style="color:'+pnlColor+';font-weight:600">'+pnlStr+'</td>'+
          '<td>'+(t.r||'-')+'</td>'+
          '<td>'+(t.tf||'-')+'</td>'+
          '<td>'+(t.strat ? '<span class="tag">'+t.strat+'</span>' : '')+note2+'</td>'+
          '<td><button class="del-btn" onclick="deleteTrade(\'bt\','+t.id+')" title="Verwijder">&#10005;</button></td>'+
          '</tr>';
      }
    }).join('');
  }

  function renderChart(mode) {
    var trades = data[mode].slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
    var running = 0;
    var labels = ['Start'];
    var points = [0];
    trades.forEach(function(t){ running += t.pnl; labels.push(t.date); points.push(parseFloat(running.toFixed(2))); });
    var canvasId = mode+'-chart';
    if (charts[mode]) { charts[mode].destroy(); }
    var last = points[points.length-1];
    var color = last >= 0 ? '#00C896' : '#FF4757';
    charts[mode] = new Chart(document.getElementById(canvasId), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Equity',
          data: points,
          borderColor: color,
          borderWidth: 2,
          pointRadius: points.length <= 2 ? 4 : 2,
          fill: true,
          backgroundColor: last >= 0 ? 'rgba(0,200,150,.07)' : 'rgba(255,71,87,.07)',
          tension: 0.35,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx){ return '€'+ctx.parsed.y.toFixed(2); } } } },
        scales: {
          x: { display: labels.length > 2, ticks: { color: '#8892A4', font: { size: 10 }, maxTicksLimit: 7 }, grid: { display: false } },
          y: { ticks: { color: '#8892A4', font: { size: 10, family: "'IBM Plex Mono'" }, callback: function(v){ return '€'+v; } }, grid: { color: 'rgba(255,255,255,0.04)' } }
        }
      }
    });
  }

  function renderAll() {
    renderStats('live'); renderTable('live'); renderChart('live');
    renderStats('bt'); renderTable('bt'); renderChart('bt');
  }

  function save() {
    try { localStorage.setItem('tj-data', JSON.stringify(data)); } catch(e) {}
  }

  function load() {
    try {
      var raw = localStorage.getItem('tj-data');
      if (raw) data = JSON.parse(raw);
    } catch(e) {}
  }

  function exportCSV(mode) {
    var trades = data[mode];
    if (!trades.length) { alert('Geen trades om te exporteren.'); return; }
    var headers = mode === 'live'
      ? ['Datum','Symbool','Richting','Instap','Exit','Grootte','PnL','R','Tags','Notities']
      : ['Datum','Symbool','Richting','Instap','Exit','PnL','R','Timeframe','Strategie','Notities'];
    var rows = trades.map(function(t) {
      if (mode === 'live') return [t.date,t.sym,t.dir,t.entry,t.exit,t.size,t.pnl,t.r,'"'+t.tag+'"','"'+t.notes+'"'].join(',');
      return [t.date,t.sym,t.dir,t.entry,t.exit,t.pnl,t.r,t.tf,'"'+t.strat+'"','"'+t.notes+'"'].join(',');
    });
    var csv = [headers.join(',')].concat(rows).join('\n');
    var blob = new Blob([csv], {type:'text/csv'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'trading-journal-'+(mode==='live'?'live':'backtest')+'-'+today+'.csv';
    a.click();
  }

  load();
  renderAll();
</script>
</body>
</html>
